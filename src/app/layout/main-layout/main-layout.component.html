<app-header />

<mat-sidenav-container class="layout">
    <mat-sidenav #sidenav class="layout__sidenav" [mode]="isMobile() ? 'over' : 'side'" [opened]="!isMobile()">
        <app-sidebar [isMobile]="isMobile()" (closeSidebar)="sidenav.close()" />
    </mat-sidenav>

    <mat-sidenav-content class="layout__content">
        @if (isMobile() && !sidenav.opened) {
        <button class="layout__open-handle" (click)="sidenav.open()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M9 18l6-6-6-6" />
            </svg>
        </button>
        }

        <main>
            <router-outlet />
        </main>
    </mat-sidenav-content>
</mat-sidenav-container>
